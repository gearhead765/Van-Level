# Custom Lovelace YAML for Van Leveling Package
#   You can add this to a dashboard via the Raw Configuration Editor or through the YAML mode
#
# Assumes:
#    * You've already added your van_leveling.yaml under /config/packages/
#    * You've added the following to configuration.yaml
#         homeassistant:
#           packages: !include_dir_named packages
#    * The following sensors exist (created in van_leveling.yaml):
#         sensor.van_level_text
#         sensor.van_level_left_front_lift
#         sensor.van_level_right_front_lift
#         sensor.van_level_right_rear_lift
#         sensor.van_level_left_rear_lift
#         sensor.van_level_pitch
#         sensor.van_level_roll
#    * /config/www/van_top_view.png exists

- type: vertical-stack
  cards:
    - type: picture-elements
      image: /local/van_top_view.png
      elements:
        - type: conditional
          conditions:
            - entity: sensor.van_level_left_front_lift
              state_not: '0'
          elements:
            - type: state-label
              entity: sensor.van_level_left_front_lift
              style:
                left: 16%
                bottom: 15%
                transform: translate(-50%, 50%)
                color: white
                background: rgba(0, 0, 0, 0.5)
                padding: 0px
                border-radius: 4px
        - type: conditional
          conditions:
            - entity: sensor.van_level_right_front_lift
              state_not: '0'
          elements:
            - type: state-label
              entity: sensor.van_level_right_front_lift
              style:
                left: 16%
                top: 14%
                transform: translate(-50%, -50%)
                color: white
                background: rgba(0, 0, 0, 0.5)
                padding: 0px
                border-radius: 4px
        - type: conditional
          conditions:
            - entity: sensor.van_level_right_rear_lift
              state_not: '0'
          elements:
            - type: state-label
              entity: sensor.van_level_right_rear_lift
              style:
                right: 30%
                top: 14%
                transform: translate(50%, -50%)
                color: white
                background: rgba(0, 0, 0, 0.5)
                padding: 0px
                border-radius: 4px
        - type: conditional
          conditions:
            - entity: sensor.van_level_left_rear_lift
              state_not: '0'
          elements:
            - type: state-label
              entity: sensor.van_level_left_rear_lift
              style:
                right: 30%
                bottom: 15%
                transform: translate(50%, 50%)
                color: white
                background: rgba(0, 0, 0, 0.5)
                padding: 0px
                border-radius: 4px
        - type: state-label
          entity: sensor.van_level_text
          prefix: Transit T-350 EXT HR
          style:
            left: 50%
            top: 38%
            transform: translate(-50%, -50%)
            color: '#000000'
            font-weight: bold
            font-size: 1.2em
        - type: state-label
          entity: sensor.van_level_text
          prefix: 148in WB
          style:
            left: 50%
            top: 44%
            transform: translate(-50%, -50%)
            color: '#000000'
            font-weight: bold
            font-size: 1.2em
        - type: state-label
          entity: sensor.van_level_text
          prefix: 68in Track
          style:
            left: 50%
            top: 50%
            transform: translate(-50%, -50%)
            color: '#000000'
            font-weight: bold
            font-size: 1.2em
        - type: state-label
          entity: sensor.van_level_pitch
          prefix: 'Pitch: '
          style:
            left: 50%
            top: 56%
            transform: translate(-50%, -50%)
            color: '#000000'
            font-weight: bold
            font-size: 1.2em
        - type: state-label
          entity: sensor.van_level_roll
          prefix: 'Roll: '
          style:
            left: 50%
            top: 62%
            transform: translate(-50%, -50%)
            color: '#000000'
            font-weight: bold
            font-size: 1.2em
